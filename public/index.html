<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>变电运维五班操作票系统</title>
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <h1>⚡ 变电运维五班操作票系统</h1>
  <div class="header-actions">
    <span class="app-version-badge" id="appVersionBadge" title="当前版本">V1.0.0</span>
    <span class="auth-badge viewer" id="authBadge">👁 查看模式</span>
    <button class="btn btn-white" id="authBtn" onclick="showLoginModal()">验证密码</button>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <select id="stationSelect">
    <option value="">-- 选择变电站 --</option>
  </select>
  <button class="btn btn-outline btn-sm icon-btn" id="addStationBtn" title="管理变电站" style="display:none" onclick="showStationManage()">➕</button>
  <input type="text" id="searchInput" placeholder="搜索操作任务..." />
  <div id="exportUI" style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-outline btn-sm" onclick="exportSelectedTasks()">⬇ 批量导出</button>
    <button class="btn btn-outline btn-sm" onclick="toggleSelectAll()">全选</button>
    <button class="btn btn-outline btn-sm" onclick="selectAllVisible(false)">清空</button>
  </div>
  <div id="editorUI" style="display:none;gap:8px;align-items:center">
    <button class="btn btn-success btn-sm" onclick="showAddTaskModal()">＋ 新增操作票</button>
    <button class="btn btn-outline btn-sm" onclick="showImportTxtModal()">📥 导入TXT</button>
    <button class="btn btn-outline btn-sm" onclick="showManageModal()">⚙ 管理</button>
    <button class="btn btn-outline btn-sm" onclick="openReviewInbox()">📝 审核箱</button>
    <button class="btn btn-outline btn-sm" onclick="showAIConfigModal()">🤖 AI配置</button>
    <button class="btn btn-outline btn-sm" onclick="showChangePasswordModal()">🔑 修改密码</button>
  </div>
</div>

<!-- Count Bar -->
<div class="count-bar" id="countBar">加载中...</div>

<!-- Main Content -->
<div class="main" id="mainContent">
  <div id="taskContainer">
    <div style="text-align:center;padding:40px;color:var(--text-secondary)">请先选择一个变电站</div>
  </div>
</div>

<!-- Footer -->
<footer class="app-footer">
  <span class="footer-copyright">©2026 变电运维五班操作票系统 <span id="footerVersion">V1.0.0</span> · 变电运维五班 · 完全实况 · 保留所有权利 · 仅供变电运维五班内部使用</span>
  <span class="footer-links">
    <a href="javascript:void(0)" class="footer-link" onclick="showVersionModal()">版本记录</a>
    <a href="javascript:void(0)" class="footer-link" id="apkDownload" style="display:none" onclick="downloadApk()">📱 下载安卓App</a>
  </span>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        // 部署新版本后，Service Worker 安装就绪即自动刷新一次，
        // 确保加载到最新 app.js（避免旧缓存导致「导出/APK 等功能看起来没修好」）。
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      }).catch(() => {});
    });
  }
</script>
</body>
</html>
