<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>变电运维五班操作票系统</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <h1>⚡ 变电运维五班操作票系统</h1>
  <div class="header-actions">
    <span class="app-version-badge" id="appVersionBadge" title="当前版本">V1.0.0</span>
    <span class="auth-badge viewer" id="authBadge">👁 查看模式</span>
    <button class="btn btn-white" id="authBtn" onclick="showLoginModal()">验证密码</button>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <select id="stationSelect">
    <option value="">-- 选择变电站 --</option>
  </select>
  <input type="text" id="searchInput" placeholder="搜索操作任务..." />
  <div id="exportUI" style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-outline btn-sm" onclick="exportSelectedTasks()">⬇ 批量导出</button>
    <button class="btn btn-outline btn-sm" onclick="selectAllVisible(true)">全选</button>
    <button class="btn btn-outline btn-sm" onclick="selectAllVisible(false)">清空</button>
  </div>
  <div id="editorUI" style="display:none;gap:8px;align-items:center">
    <button class="btn btn-success btn-sm" onclick="showAddTaskModal()">＋ 新增操作票</button>
    <button class="btn btn-outline btn-sm" onclick="showImportTxtModal()">📥 导入TXT</button>
    <button class="btn btn-outline btn-sm" onclick="importExistingData()">📥 导入已有库</button>
    <button class="btn btn-outline btn-sm" onclick="showManageModal()">⚙ 管理</button>
    <button class="btn btn-outline btn-sm" onclick="openReviewInbox()">📝 审核箱</button>
    <button class="btn btn-outline btn-sm" onclick="showAIConfigModal()">🤖 AI配置</button>
    <button class="btn btn-outline btn-sm" onclick="showChangePasswordModal()">🔑 修改密码</button>
  </div>
</div>

<!-- Count Bar -->
<div class="count-bar" id="countBar">加载中...</div>

<!-- Main Content -->
<div class="main" id="mainContent">
  <div id="taskContainer">
    <div style="text-align:center;padding:40px;color:var(--text-secondary)">请先选择一个变电站</div>
  </div>
</div>

<!-- Footer -->
<footer class="app-footer">
  <span class="footer-left">变电运维五班操作票系统 · 当前版本 <span id="footerVersion">V1.0.0</span></span>
  <a href="javascript:void(0)" class="footer-link" onclick="showVersionModal()">版本记录</a>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/app.js"></script>
</body>
</html>
