version: '3.8'

services:
  ticket-system:
    # 本地构建：不依赖私有镜像仓库，直接用同目录 Dockerfile 从源码构建
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化 SQLite 数据库到 NAS/主机目录（增量更新不影响数据）
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/auth/status',r=>process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
