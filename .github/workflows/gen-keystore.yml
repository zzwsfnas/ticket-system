name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      keyalias:
        description: 'Key alias'
        required: true
        default: 'ticket-system'

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        id: out
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "${{ github.event.inputs.keyalias }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=ticket-system, OU=BDYW, O=BDYW, C=CN"
          echo "KEYSTORE_BASE64=$(base64 -w0 release.keystore)" >> "$GITHUB_OUTPUT"

      - name: Show base64 (复制为 secret KEYSTORE_BASE64)
        run: echo "::notice::KEYSTORE_BASE64=${{ steps.out.outputs.KEYSTORE_BASE64 }}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.keystore
