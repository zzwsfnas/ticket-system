name: Build and Push to GHCR

# 推送到 main 或打 v* 标签时，自动构建 Docker 镜像并推送到 GitHub Container Registry (GHCR)。
# 之后在 FNOS 上只需 `docker compose -f docker-compose.ghcr.yml pull && up -d` 即可拉取镜像。
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # 允许 GITHUB_TOKEN 推送镜像到 GHCR

env:
  IMAGE_NAME: ticket-system

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (跨架构模拟，支持 ARM)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata / tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .          # 本仓库即 ticket-system/，Dockerfile 在根
          file: ./Dockerfile
          # FNOS 多为 x86-64；若你的 FNOS 是 ARM（如 ARM 机型），已包含 arm64 多架构
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
