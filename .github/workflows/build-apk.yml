name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor (no-save, 不污染 package.json)
        run: npm install --no-save @capacitor/cli@5 @capacitor/core@5 @capacitor/android@5

      - name: Add Android platform (首次)
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure gradle signing
        working-directory: android
        run: |
          echo "RELEASE_STORE_FILE=release.keystore" > local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Publish to GitHub Release (apk-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag: apk-latest
          name: 安卓安装包（最新）
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
