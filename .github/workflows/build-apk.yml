name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install --no-save @capacitor/cli@5 @capacitor/core@5 @capacitor/android@5

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure gradle signing
        working-directory: android
        run: |
          echo "RELEASE_STORE_FILE=release.keystore" > local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: List all APKs in android directory
        run: |
          echo "=== All .apk files ==="
          find android -name "*.apk" -type f || true
          echo "=== Build outputs tree ==="
          ls -laR android/app/build/outputs/ 2>/dev/null || echo "(no outputs dir)"

      - name: Find APK file
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found! Check build output above."
            exit 1
          fi
          echo "Found APK: $APK"
          echo "APK_PATH=$APK" >> "$GITHUB_OUTPUT"

      - name: Create / update tag apk-latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f apk-latest
          git push origin apk-latest --force || true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          release_name: "APK Latest"
          body: |
            ## Ticket System Android APK
            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            Download and install on any Android device.
          files: ${{ steps.find_apk.outputs.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
