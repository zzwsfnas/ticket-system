name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 Git 标签 + 发布 Release 需要
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整历史才能创建 tag

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor (no-save, 不污染 package.json)
        run: npm install --no-save @capacitor/cli@5 @capacitor/core@5 @capacitor/android@5

      - name: Add Android platform (首次)
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure gradle signing
        working-directory: android
        run: |
          echo "RELEASE_STORE_FILE=release.keystore" > local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          chmod +x gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Find APK file
        id: find_apk
        working-directory: android
        run: echo "APK_PATH=$(find . -path '*/release/*.apk' -type f | head -1)" >> "$GITHUB_OUTPUT"

      - name: Show APK info
        run: echo "APK found at: ${{ steps.find_apk.outputs.APK_PATH }}"

      - name: Create / update tag apk-latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f apk-latest
          git push origin apk-latest --force || true

      - name: Publish to GitHub Release (apk-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: 安卓安装包（最新）
          body: |
            ## 运维五班操作票系统 安卓安装包
            **自动构建时间：** ${{ github.run_number }}
            **提交：** ${{ github.sha }}
            > 下载后在安卓设备上安装即可（需允许「未知来源」应用）。
          files: ${{ steps.find_apk.outputs.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
