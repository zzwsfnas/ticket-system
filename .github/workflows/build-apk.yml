name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install --no-save @capacitor/cli@5 @capacitor/core@5 @capacitor/android@5

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure gradle signing
        working-directory: android
        run: |
          chmod +x gradlew
          # 把签名凭据写入 keystore.properties（rootProject = android/），由 build.gradle 显式加载。
          # 注意：local.properties 里的自定义键不会自动变成 Gradle 属性，故必须用独立 properties 文件。
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          # 默认 `npx cap add android` 生成的 app/build.gradle 没有 signingConfigs 块，
          # 且 release 未指向 keystore -> assembleRelease 产出「未签名」APK ->
          # 手机安装报「解析软件包出现问题(33) packageInfo is null」。
          # 这里确定性地注入 signingConfigs.release（含 v1+v2；v1 兼容 Android 6 及部分国产 ROM），
          # 并让 buildTypes.release 使用它。build.gradle 只含 keystoreProps 引用，无明文密钥。
          python3 - <<'PY'
          import re
          f = 'app/build.gradle'
          s = open(f).read()
          # 0) 在 android { 之前注入 keystore.properties 加载器
          if 'keystoreProps' not in s:
              loader = ("def keystorePropsFile = rootProject.file(\"keystore.properties\")\n"
                        "def keystoreProps = new Properties()\n"
                        "keystoreProps.load(new FileInputStream(keystorePropsFile))\n\n")
              s = re.sub(r'(^|\n)(android\s*\{)', r'\1' + loader + r'\2', s, count=1)
          # 1) 在 android { 之后确定性地注入 signingConfigs.release（不依赖已有块）
          if 'signingConfigs' not in s:
              block = ("\n    signingConfigs {\n"
                       "        release {\n"
                       "            storeFile file(keystoreProps['storeFile'])\n"
                       "            storePassword keystoreProps['storePassword']\n"
                       "            keyAlias keystoreProps['keyAlias']\n"
                       "            keyPassword keystoreProps['keyPassword']\n"
                       "            v1SigningEnabled true\n"
                       "            v2SigningEnabled true\n"
                       "        }\n"
                       "    }\n")
              s = re.sub(r'(android\s*\{)', r'\1' + block, s, count=1)
          # 2) buildTypes.release 使用该签名配置
          if 'signingConfig signingConfigs.release' not in s:
              s = re.sub(r'(buildTypes\s*\{\s*release\s*\{)',
                         r'\1\n            signingConfig signingConfigs.release', s, flags=re.S, count=1)
          open(f, 'w').write(s)
          print("patched build.gradle: keystore loader + signingConfigs.release + v1/v2 enabled")
          PY
          echo "===== effective app/build.gradle (no secrets, only keystoreProps refs) ====="
          cat app/build.gradle

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: List all APKs in android directory
        run: |
          echo "=== All .apk files ==="
          find android -name "*.apk" -type f || true
          echo "=== Build outputs tree ==="
          ls -laR android/app/build/outputs/ 2>/dev/null || echo "(no outputs dir)"

      - name: Find APK file
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found! Check build output above."
            exit 1
          fi
          echo "Found APK: $APK"
          echo "APK_PATH=$APK" >> "$GITHUB_OUTPUT"

      - name: Verify APK is signed
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          export APK
          python3 - <<'PY'
          import zipfile, os, sys
          p = os.environ['APK']
          z = zipfile.ZipFile(p)
          names = z.namelist()
          v1 = any(n.startswith('META-INF/') and (n.endswith('.RSA') or n.endswith('.DSA') or n.endswith('.EC')) for n in names)
          data = open(p, 'rb').read()
          v2 = data.find(b'APK Sig Block 42') != -1
          print("APK:", p)
          print("v1 signature (META-INF/*.RSA):", v1)
          print("v2/v3 signing block:", v2)
          if not (v1 or v2):
              print("::error::APK is NOT signed -> Android will fail with 'parse package' error. Aborting release.")
              sys.exit(1)
          print("OK: APK is properly signed.")
          PY

      - name: Create / update tag apk-latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f apk-latest
          git push origin apk-latest --force || true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          release_name: "APK Latest"
          body: |
            ## Ticket System Android APK
            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            Download and install on any Android device.
          files: ${{ steps.find_apk.outputs.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
